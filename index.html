<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Manga Flan V8</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body{margin:0; font-family:Arial; background:#111; color:white; user-select:none; overflow:hidden;}
.header{background:linear-gradient(90deg,#ffb347,#ffcc33);padding:12px;font-size:22px;font-weight:bold;color:black;}
.toolbar{display:flex; flex-wrap:wrap; gap:6px; padding:10px; background:#222;}
button{padding:6px 10px; background:#333; border:none; color:white; cursor:pointer; border-radius:6px;}
button.active{background:#ffb347;color:black;}
input[type=color]{width:36px;height:36px;border:none;}
input[type=range]{width:100px;}
.main{display:flex; flex-direction:column; height:calc(100vh-110px);}
.canvas-wrapper{flex:1; display:flex; justify-content:center; align-items:center; background:#1a1a1a; overflow:hidden; position:relative; touch-action:none;}
canvas{background:white; box-shadow:0 0 15px black; touch-action:none;}
.pages{height:100px; background:#222; display:flex; gap:8px; padding:8px; overflow-x:auto;}
.thumb{min-width:80px; height:100px; background:white; border:2px solid transparent; cursor:pointer;}
.thumb.active{border:2px solid #ffcc33;}
</style>
</head>
<body>
<div class="header">🍮 Manga Flan V8</div>

<div class="toolbar">
<button onclick="setTool('brush')">🖌️ Pincel</button>
<button onclick="setTool('eraser')">🧽 Borrador</button>
<button onclick="setTool('line')">📏 Línea</button>
<button onclick="setTool('rect')">⬛ Rectángulo</button>
<button onclick="setTool('circle')">🔵 Círculo</button>
<button onclick="setTool('cube')">🧊 Cubo</button>
<button onclick="setTool('text')">💬 Texto</button>
<input type="color" id="color" value="#000000">
<input type="range" id="size" min="1" max="40" value="3">
<button onclick="undo()">↩️</button>
<button onclick="redo()">↪️</button>
<button onclick="addPage()">➕ Página</button>
<button onclick="prevPage()">⬅️</button>
<button onclick="nextPage()">➡️</button>
<button onclick="clearPage()">🧹 Limpiar</button>
<button onclick="saveImage()">💾 Guardar</button>
<button onclick="dividePage(2)">2 Paneles</button>
<button onclick="dividePage(3)">3 Paneles</button>
</div>

<div class="main">
<div class="canvas-wrapper">
<canvas id="canvas" width="1200" height="800"></canvas>
</div>
<div class="pages" id="pages"></div>
</div>

<script>
const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
const color=document.getElementById('color'), size=document.getElementById('size');
const pagesUI=document.getElementById('pages');

let tool='brush', drawing=false, startX, startY, tempImage=null;
let scale=1, pan={x:0,y:0}, isPanning=false, panStart={x:0,y:0};
let pages=[], currentPage=0, history=[], redoStack=[];
let objects=[], panels=[];
let selectedObj=null, offset={x:0,y:0};
let lastPos={x:0,y:0};

// ===== TOOLS =====
function setTool(t){tool=t;}
function saveState(){history.push(canvas.toDataURL()); if(history.length>50) history.shift(); redoStack=[];}
function undo(){if(history.length===0)return; redoStack.push(canvas.toDataURL()); let img=new Image(); img.src=history.pop(); img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); drawPanels(); drawObjects();}}
function redo(){if(redoStack.length===0)return; history.push(canvas.toDataURL()); let img=new Image(); img.src=redoStack.pop(); img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); drawPanels(); drawObjects();}}

// ===== MOUSE & TOUCH EVENTS =====
function getPos(e){const rect=canvas.getBoundingClientRect(); 
if(e.touches){return {x:(e.touches[0].clientX-rect.left)/scale, y:(e.touches[0].clientY-rect.top)/scale};}
return {x:(e.clientX-rect.left)/scale, y:(e.clientY-rect.top)/scale};}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('touchstart', startDraw);
canvas.addEventListener('mousemove', drawMove);
canvas.addEventListener('touchmove', drawMove);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchend', endDraw);

function startDraw(e){
    e.preventDefault();
    const pos=getPos(e); startX=pos.x; startY=pos.y; lastPos=pos;
    if(tool==='text'){addText(pos.x,pos.y); return;}
    selectedObj=null;
    for(let i=objects.length-1;i>=0;i--){const o=objects[i]; if(pos.x>o.x&&pos.x<o.x+o.w&&pos.y>o.y&&pos.y<o.y+o.h){selectedObj=o; offset.x=pos.x-o.x; offset.y=pos.y-o.y; return;}}
    saveState();
    drawing=true;
    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
}

function drawMove(e){
    e.preventDefault();
    const pos=getPos(e);
    if(selectedObj){selectedObj.x=pos.x-offset.x; selectedObj.y=pos.y-offset.y; redrawCanvas(); return;}
    if(!drawing) return;
    if(tool==='brush'||tool==='eraser'){ctx.lineWidth=size.value; ctx.lineCap='round'; ctx.strokeStyle=tool==='eraser'?'white':color.value; ctx.lineTo(pos.x,pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x,pos.y);}
    else{redrawLast(); previewShape(pos.x,pos.y);}
}

function endDraw(e){drawing=false; tempImage=null; selectedObj=null; ctx.beginPath();}

// ===== SHAPES =====
function redrawLast(){if(!tempImage)return; ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(tempImage,0,0); drawPanels(); drawObjects();}
function previewShape(x,y){ctx.strokeStyle=color.value; 
if(tool==='line'){ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(x,y); ctx.stroke();}
if(tool==='rect'){ctx.strokeRect(startX,startY,x-startX,y-startY);}
if(tool==='circle'){let r=Math.sqrt((x-startX)**2+(y-startY)**2); ctx.beginPath(); ctx.arc(startX,startY,r,0,Math.PI*2); ctx.stroke();}
if(tool==='cube'){let w=x-startX,h=y-startY,d=30; ctx.strokeRect(startX,startY,w,h); ctx.strokeRect(startX+d,startY-d,w,h); ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(startX+d,startY-d); ctx.moveTo(startX+w,startY); ctx.lineTo(startX+w+d,startY-d); ctx.moveTo(startX,startY+h); ctx.lineTo(startX+d,startY+h-d); ctx.moveTo(startX+w,startY+h); ctx.lineTo(startX+w+d,startY+h-d); ctx.stroke();}}
function drawShape(x,y){previewShape(x,y);}

// ===== TEXT & GLOBOS =====
function addText(x,y){
    const txt=prompt('Escribe tu texto:'); if(!txt) return;
    const w=200,h=60;
    const obj={x,y,w,h,text:txt,type:'dialog'};
    objects.push(obj);
    redrawCanvas();
}

function drawObjects(){
    for(const o of objects){
        ctx.save(); ctx.fillStyle='white'; ctx.strokeStyle='black'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,20); ctx.fill(); ctx.stroke();
        ctx.fillStyle='black'; ctx.font='16px sans-serif'; wrapText(ctx,o.text,o.x+10,o.y+20,o.w-20,18);
        ctx.restore();
    }
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){
    const words=text.split(' '); let line=''; for(let n=0;n<words.length;n++){let testLine=line+words[n]+' '; if(ctx.measureText(testLine).width>maxWidth && n>0){ctx.fillText(line,x,y); line=words[n]+' '; y+=lineHeight;}else{line=testLine;} ctx.fillText(line,x,y);}
}

// ===== PANEL DIVIDE =====
function dividePage(n){
    panels=[]; const panelW=canvas.width/n;
    for(let i=0;i<n;i++){panels.push({x:i*panelW, y:0, w:panelW, h:canvas.height});}
    redrawCanvas();
}

function drawPanels(){
    ctx.save();
    ctx.strokeStyle='black'; ctx.lineWidth=3;
    for(const p of panels){ctx.strokeRect(p.x,p.y,p.w,p.h);}
    ctx.restore();
}

// ===== REDRAW =====
function redrawCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height); drawPanels(); drawObjects();}

// ===== PAGES =====
function addPage(){savePage(); const temp=document.createElement('canvas'); temp.width=canvas.width; temp.height=canvas.height; temp.getContext('2d').fillStyle='white'; temp.getContext('2d').fillRect(0,0,temp.width,temp.height); pages.push(temp); currentPage=pages.length-1; renderPages(); loadPage(currentPage);}
function savePage(){if(!pages[currentPage])return; const temp=document.createElement('canvas'); temp.width=canvas.width; temp.height=canvas.height; temp.getContext('2d').drawImage(canvas,0,0); pages[currentPage]=temp;}
function loadPage(index){ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(pages[index],0,0); drawPanels(); drawObjects();}
function renderPages(){pagesUI.innerHTML='';[...pages].reverse().forEach((p,rIndex)=>{const index=pages.length-1-rIndex; const thumb=document.createElement('canvas'); thumb.width=80; thumb.height=100; thumb.className='thumb'; if(index===currentPage) thumb.classList.add('active'); thumb.getContext('2d').drawImage(p,0,0,80,100); thumb.onclick=()=>{savePage(); currentPage=index; loadPage(index); renderPages();}; pagesUI.appendChild(thumb);});}
function nextPage(){if(currentPage<pages.length-1){savePage(); currentPage++; loadPage(currentPage); renderPages();}}
function prevPage(){if(currentPage>0){savePage(); currentPage--; loadPage(currentPage); renderPages();}}

// ===== CLEAR & SAVE =====
function clearPage(){saveState(); ctx.fillStyle='white'; ctx.fillRect(0,0,canvas.width,canvas.height); objects=[]; panels=[];}
function saveImage(){let link=document.createElement('a'); link.download='MangaFlan.png'; link.href=canvas.toDataURL(); link.click();}

// ===== START =====
addPage();
</script>
</body>
</html>
