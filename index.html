<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Manga Flan - Full Editor</title>
<style>
body{margin:0; background:#111; color:white; font-family:Arial; user-select:none; overflow:hidden;}
.header{background:linear-gradient(90deg,#ffb347,#ffcc33); padding:12px; text-align:center; font-weight:bold; font-size:22px; color:black;}
.toolbar{display:flex; flex-wrap:wrap; gap:6px; padding:10px; background:#222; justify-content:center;}
button{padding:6px 10px; border:none; border-radius:6px; background:#333; color:white; cursor:pointer;}
button.active{background:#ffb347; color:black;}
input[type=color]{width:36px; height:36px; border:none;}
input[type=range]{width:100px;}
.main{display:flex; flex-direction:column; height:calc(100vh - 110px);}
.canvas-wrapper{flex:1; position:relative; background:#1a1a1a; overflow:hidden;}
canvas{background:white; display:block; margin:0 auto; box-shadow:0 0 10px black; touch-action:none;}
.pages{height:100px; background:#222; display:flex; gap:8px; padding:8px; overflow-x:auto;}
.thumb{min-width:80px; height:100px; background:white; border:2px solid transparent; cursor:pointer;}
.thumb.active{border:2px solid #ffcc33;}
</style>
</head>
<body>

<div class="header">🍮 Manga Flan</div>

<div class="toolbar">
<button onclick="setTool('brush')">🖌️ Pincel</button>
<button onclick="setTool('eraser')">🧽 Borrador</button>
<button onclick="setTool('line')">📏 Línea</button>
<button onclick="setTool('rect')">⬛ Rectángulo</button>
<button onclick="setTool('circle')">🔵 Círculo</button>
<button onclick="setTool('cube')">🧊 Cubo</button>
<button onclick="setTool('text')">💬 Texto</button>
<input type="color" id="color" value="#000000">
<input type="range" id="size" min="1" max="40" value="3">
<button onclick="undo()">↩️</button>
<button onclick="redo()">↪️</button>
<button onclick="addPage()">➕ Página</button>
<button onclick="prevPage()">⬅️</button>
<button onclick="nextPage()">➡️</button>
<button onclick="clearPage()">🧹 Limpiar</button>
<button onclick="saveImage()">💾 Guardar</button>
<button onclick="dividePage(2)">2 Paneles</button>
<button onclick="dividePage(3)">3 Paneles</button>
</div>

<div class="main">
<div class="canvas-wrapper">
<canvas id="canvas" width="1200" height="800"></canvas>
</div>
<div class="pages" id="pages"></div>
</div>

<script>
const canvas=document.getElementById('canvas'), ctx=canvas.getContext('2d');
const color=document.getElementById('color'), size=document.getElementById('size');
const pagesUI=document.getElementById('pages');

let tool='brush', drawing=false, startX, startY;
let scale=1, pan={x:0,y:0}, selectedObj=null, offset={x:0,y:0};
let history=[], redoStack=[];
let pages=[], currentPage=0;

// ===== PAGE STRUCTURE =====
function createPage(){return {shapes:[], objects:[], panels:[]};}
pages.push(createPage());

// ===== TOOL =====
function setTool(t){tool=t;}

// ===== HISTORY =====
function saveState(){const p=pages[currentPage]; history.push(JSON.parse(JSON.stringify(p))); if(history.length>50) history.shift(); redoStack=[];}
function undo(){if(history.length===0) return; redoStack.push(JSON.parse(JSON.stringify(pages[currentPage]))); pages[currentPage]=history.pop(); redraw();}
function redo(){if(redoStack.length===0) return; history.push(JSON.parse(JSON.stringify(pages[currentPage]))); pages[currentPage]=redoStack.pop(); redraw();}

// ===== POSITION =====
function getPos(e){const rect=canvas.getBoundingClientRect(); 
if(e.touches) return {x:(e.touches[0].clientX-rect.left)/scale, y:(e.touches[0].clientY-rect.top)/scale};
return {x:(e.clientX-rect.left)/scale, y:(e.clientY-rect.top)/scale};}

// ===== DRAW EVENTS =====
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('touchstart', startDraw);
canvas.addEventListener('mousemove', drawMove);
canvas.addEventListener('touchmove', drawMove);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchend', endDraw);

function startDraw(e){
    e.preventDefault();
    const pos=getPos(e); startX=pos.x; startY=pos.y;
    selectedObj=null;
    const objs=pages[currentPage].objects;
    for(let i=objs.length-1;i>=0;i--){
        const o=objs[i];
        if(pos.x>o.x && pos.x<o.x+o.w && pos.y>o.y && pos.y<o.y+o.h){selectedObj=o; offset.x=pos.x-o.x; offset.y=pos.y-o.y; return;}
    }
    saveState();
    drawing=true;

    if(tool==='brush' || tool==='eraser'){
        const c=tool==='eraser'?'white':color.value;
        pages[currentPage].shapes.push({tool,color:c,size:size.value,points:[{x:startX,y:startY}]});
    } else if(tool!=='text'){
        pages[currentPage].shapes.push({tool,startX,startY,endX:startX,endY:startY,color:color.value,size:size.value});
    } else{
        const txt=prompt('Escribe tu texto:'); if(!txt) return;
        pages[currentPage].objects.push({x:pos.x,y:pos.y,w:200,h:60,text:txt});
        redraw();
    }
}

function drawMove(e){
    e.preventDefault();
    if(!drawing) return;
    const pos=getPos(e);
    if(selectedObj){selectedObj.x=pos.x-offset.x; selectedObj.y=pos.y-offset.y; redraw(); return;}
    const shapes=pages[currentPage].shapes;
    const s=shapes[shapes.length-1];
    if(!s) return;
    if(s.tool==='brush' || s.tool==='eraser'){s.points.push({x:pos.x,y:pos.y});}
    else{s.endX=pos.x; s.endY=pos.y;}
    redraw();
}

function endDraw(e){drawing=false; selectedObj=null;}

// ===== PAN/ZOOM =====
canvas.addEventListener('wheel', e=>{e.preventDefault(); scale*=e.deltaY>0?0.9:1.1; redraw();});

// ===== PANELS =====
function dividePage(n){const p=pages[currentPage]; p.panels=[]; const w=canvas.width/n; for(let i=0;i<n;i++){p.panels.push({x:i*w,y:0,w:w,h:canvas.height}); redraw();}}

// ===== REDRAW =====
function redraw(){
    ctx.setTransform(scale,0,0,scale,0,0); ctx.clearRect(0,0,canvas.width,canvas.height);
    const p=pages[currentPage];
    p.panels.forEach(pan=>{ctx.strokeStyle='black'; ctx.lineWidth=3; ctx.strokeRect(pan.x,pan.y,pan.w,pan.h);});
    p.shapes.forEach(s=>{
        ctx.strokeStyle=s.color; ctx.lineWidth=s.size; ctx.lineCap='round';
        if(s.tool==='brush' || s.tool==='eraser'){ctx.beginPath(); ctx.moveTo(s.points[0].x,s.points[0].y); for(let i=1;i<s.points.length;i++){ctx.lineTo(s.points[i].x,s.points[i].y);} ctx.stroke();}
        else if(s.tool==='line'){ctx.beginPath(); ctx.moveTo(s.startX,s.startY); ctx.lineTo(s.endX,s.endY); ctx.stroke();}
        else if(s.tool==='rect'){ctx.strokeRect(s.startX,s.startY,s.endX-s.startX,s.endY-s.startY);}
        else if(s.tool==='circle'){let r=Math.hypot(s.endX-s.startX,s.endY-s.startY); ctx.beginPath(); ctx.arc(s.startX,s.startY,r,0,2*Math.PI); ctx.stroke();}
        else if(s.tool==='cube'){let w=s.endX-s.startX,h=s.endY-s.startY,d=30; ctx.strokeRect(s.startX,s.startY,w,h); ctx.strokeRect(s.startX+d,s.startY-d,w,h); ctx.beginPath(); ctx.moveTo(s.startX,s.startY); ctx.lineTo(s.startX+d,s.startY-d); ctx.moveTo(s.startX+w,s.startY); ctx.lineTo(s.startX+w+d,s.startY-d); ctx.moveTo(s.startX,s.startY+h); ctx.lineTo(s.startX+d,s.startY+h-d); ctx.moveTo(s.startX+w,s.startY+h); ctx.lineTo(s.startX+w+d,s.startY+h-d); ctx.stroke();}
    });
    p.objects.forEach(o=>{
        ctx.save(); ctx.fillStyle='white'; ctx.strokeStyle='black'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(o.x,o.y,o.w,o.h,20); ctx.fill(); ctx.stroke();
        ctx.fillStyle='black'; ctx.font='16px sans-serif'; wrapText(ctx,o.text,o.x+10,o.y+20,o.w-20,18); ctx.restore();
    });
}

// ===== TEXT WRAP =====
function wrapText(ctx,text,x,y,maxWidth,lineHeight){let words=text.split(' '),line=''; for(let n=0;n<words.length;n++){let testLine=line+words[n]+' '; if(ctx.measureText(testLine).width>maxWidth && n>0){ctx.fillText(line,x,y); line=words[n]+' '; y+=lineHeight;}else{line=testLine;} ctx.fillText(line,x,y);}}

// ===== PAGES UI =====
function renderPages(){pagesUI.innerHTML=''; pages.forEach((p,i)=>{const thumb=document.createElement('canvas'); thumb.width=80; thumb.height=100; thumb.className='thumb'; if(i===currentPage)thumb.classList.add('active'); thumb.getContext('2d').drawImage(canvas,0,0,80,100); thumb.onclick=()=>{currentPage=i; redraw(); renderPages();}; pagesUI.appendChild(thumb);});}
function addPage(){pages.push(createPage()); currentPage=pages.length-1; redraw(); renderPages();}
function nextPage(){if(currentPage<pages.length-1){currentPage++; redraw(); renderPages();}}
function prevPage(){if(currentPage>0){currentPage--; redraw(); renderPages();}}

// ===== CLEAR / SAVE =====
function clearPage(){saveState(); pages[currentPage].shapes=[]; pages[currentPage].objects=[]; pages[currentPage].panels=[]; redraw();}
function saveImage(){let link=document.createElement('a'); link.download='MangaFlan.png'; link.href=canvas.toDataURL(); link.click();}

renderPages();
redraw();
</script>
</body>
</html>
